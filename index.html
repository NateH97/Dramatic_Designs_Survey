<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HTML + CSS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Dramatic Designs Survey</h1>
        <p id="description">Satisfied with your design? Let us know!</p>
      </header>
      <form>
        <label for="user-name">Name:</label>
        <input
          type="text"
          id="user-name"
          name="user-name"
          placeholder="Patrick Jane"
          required
        />
        <label for="user-email">Email:</label>
        <input
          type="email"
          id="uder-email"
          name="user-email"
          placeholder="Uchiha@email.com"
          required
        />
        <label for="dropdown" name="rating">Your Experience?</label>
        <select id="dropdown" name="rating">
          <option value="poor">Poor</option>
          <option value="good">Good</option>
          <option value="perfect">Perfect</option>
          <option value="encore">I Want Another</option>
        </select>

        <fieldset>
          <legend>Have You Used Our Services Before</legend>
          <input
            type="radio"
            id="prev-yes"
            name="previous"
            value="yes"
            required
          />
          <label for="prev-yes">Yes</label>
          <input
            type="radio"
            id="prev-no"
            name="previous"
            value="no"
            required
          />
          <label for="prev-no">No</label>
        </fieldset>

        <fieldset>
          <legend>How Did You Hear About Us?</legend>
          <div class="checks">
            <input
              type="checkbox"
              id="facebook"
              name="heard"
              value="facebook"
            />
            <label for="facebook">Facebook</label>
          </div>
          <div class="checks">
            <input type="checkbox" id="twitter" name="heard" value="twitter" />
            <label for="twitter">Twitter (X)</label>
          </div>

          <div class="checks">
            <input
              type="checkbox"
              id="instagram"
              name="heard"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
          </div>

          <div class="checks">
            <input
              type="checkbox"
              id="referral"
              name="heard"
              value="referral"
            />
            <label for="referral">Referral</label>
          </div>
        </fieldset>
      </form>
    </main>
  </body>
</html>
